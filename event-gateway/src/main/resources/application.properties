server.port=8080
spring.application.name=event-gateway

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Account Service URL
account.service.url=http://localhost:8081

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.accountService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.accountService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.accountService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.accountService.registerHealthIndicator=true

# Resilience4j Retry
resilience4j.retry.instances.accountService.maxAttempts=3
resilience4j.retry.instances.accountService.waitDuration=500ms
resilience4j.retry.instances.accountService.exponentialBackoffMultiplier=2
resilience4j.retry.instances.accountService.retryExceptions=java.io.IOException,java.net.ConnectException

# Resilience4j Timeout
resilience4j.timelimiter.instances.accountService.timeoutDuration=5s

# HTTP client timeout
account.service.connect-timeout=3000
account.service.read-timeout=5000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Zipkin tracing
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# Logging
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}","level":"%level","service":"event-gateway","traceId":"%X{traceId}","message":"%msg"}%n
